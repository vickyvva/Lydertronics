<div class="about-section">
    <h1>About Our Work & Services</h1>
    <div class="team-details">
        <button id="learnMoreBtn">Learn More About Team</button>
        <div id="teamInfo" style="display: none;">
            <div class="founder">
                <h2>Kotagiri Vikram</h2>
                <p>Founder details...</p>
            </div>
            <div class="manager">
                <h2>Variganti Harikrishna</h2>
                <p>Manager details...</p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('learnMoreBtn').addEventListener('click', function() {
        var teamInfo = document.getElementById('teamInfo');
        if (teamInfo.style.display === 'none') {
            teamInfo.style.display = 'block';
            this.textContent = 'Show Less';
        } else {
            teamInfo.style.display = 'none';
            this.textContent = 'Learn More About Team';
        }
    });
</script>
